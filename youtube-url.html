<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube URL</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 日本語フォント調整とベース設定 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-full flex flex-col justify-center items-center p-4">

  <!-- メインカードコンテナ -->
  <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl space-y-5">
    
    <!-- ヘッダー部分 -->
    <div class="text-center space-y-1.5">
      <h1 class="text-xl font-bold tracking-tight text-white">YouTube URL</h1>
      <p class="text-xs text-zinc-400">YouTubeの各種URLを標準形式に置換</p>
    </div>

    <!-- 入力セクション -->
    <div class="space-y-3">
      <div class="space-y-2">
        <label for="inputUrl" class="block text-xs font-medium text-zinc-400">変換前のURLを入力</label>
        <input 
          type="text" 
          id="inputUrl" 
          placeholder="例: https://youtu.be/xxxxxx や shorts形式など" 
          class="w-full px-3 py-2.5 bg-zinc-950 border border-zinc-800 rounded-lg text-sm text-white placeholder-zinc-700 focus:outline-none focus:border-zinc-700 focus:ring-1 focus:ring-zinc-700 transition-all"
          autocomplete="off"
        >
      </div>
      <!-- 変換するボタン -->
      <button 
        id="convertBtn" 
        class="w-full py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 text-sm font-medium rounded-lg transition-colors active:scale-[0.98]"
      >
        変換する
      </button>
    </div>

    <!-- 出力セクション（変換結果がある場合のみJSで表示制御） -->
    <div id="resultContainer" class="hidden space-y-2 pt-4 border-t border-zinc-800/60">
      <span class="block text-xs font-medium text-zinc-400">変換後のURL</span>
      <div class="flex gap-2">
        <!-- 変換後URL表示枠（横幅いっぱい） -->
        <input 
          type="text" 
          id="outputUrl" 
          readonly 
          class="flex-1 min-w-0 px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-lg text-sm text-zinc-300 font-mono focus:outline-none"
        >
        <!-- コピーボタン -->
        <button 
          id="copyBtn" 
          class="px-3 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs font-medium rounded-lg transition-colors shrink-0 active:scale-[0.98]"
        >
          コピー
        </button>
        <!-- 開くボタン -->
        <button 
          id="openBtn" 
          class="px-3 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs font-medium rounded-lg transition-colors shrink-0 active:scale-[0.98]"
        >
          開く
        </button>
      </div>
    </div>

  </div>

  <!-- トースト通知用コンテナ -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 bg-zinc-800 border border-zinc-700 text-white text-xs rounded-full opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2 shadow-lg">
    コピーしました！
  </div>

  <script>
    const inputUrl = document.getElementById('inputUrl');
    const convertBtn = document.getElementById('convertBtn');
    const resultContainer = document.getElementById('resultContainer');
    const outputUrl = document.getElementById('outputUrl');
    const copyBtn = document.getElementById('copyBtn');
    const openBtn = document.getElementById('openBtn');
    const toast = document.getElementById('toast');

    // トースト表示用関数
    let toastTimeout;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.remove('opacity-0', 'translate-y-2');
      toast.classList.add('opacity-100', 'translate-y-0');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0');
        toast.classList.add('opacity-0', 'translate-y-2');
      }, 2000);
    }

    // クリップボードへコピーする関数（iFrame内制約への対応）
    function copyToClipboard(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        const successful = document.execCommand('copy');
        if (successful) {
          showToast('クリップボードにコピーしました');
        } else {
          showToast('コピーできませんでした');
        }
      } catch (err) {
        showToast('コピーに失敗しました');
      }
      document.body.removeChild(textarea);
    }

    // YouTube URL 変換コアロジック
    function convertYoutubeUrl(input) {
      let urlStr = input.trim();
      if (!urlStr) return '';

      // プロトコルスキームがない場合は補完
      if (!/^https?:\/\//i.test(urlStr)) {
        urlStr = 'https://' + urlStr;
      }

      try {
        const url = new URL(urlStr);
        let videoId = '';
        let listId = url.searchParams.get('list') || '';
        let timeParam = url.searchParams.get('t') || '';

        // hostの正規化（小文字化）
        const host = url.hostname.toLowerCase();

        // 1. youtu.be 形式の場合
        if (host === 'youtu.be') {
          videoId = url.pathname.substring(1);
        } 
        // 2. youtube.com系 の場合
        else if (host.includes('youtube.com') || host.includes('youtube-nocookie.com')) {
          // Shorts形式 (youtube.com/shorts/VIDEO_ID)
          if (url.pathname.startsWith('/shorts/')) {
            videoId = url.pathname.split('/')[2];
          } 
          // 通常のwatch形式 (youtube.com/watch?v=VIDEO_ID)
          else if (url.pathname === '/watch') {
            videoId = url.searchParams.get('v') || '';
          }
          // 埋め込み形式 (youtube.com/embed/VIDEO_ID)
          else if (url.pathname.startsWith('/embed/')) {
            videoId = url.pathname.split('/')[2];
          }
          // レガシー形式 (youtube.com/v/VIDEO_ID)
          else if (url.pathname.startsWith('/v/')) {
            videoId = url.pathname.split('/')[2];
          }
        }

        // ビデオIDが取得できなかった場合は変換不可
        if (!videoId) {
          return '';
        }

        // パラメータを除外したクリーンなIDのみ（スラッシュ以降のパラメータや、?付きパラメータの切り落とし）
        videoId = videoId.split('?')[0].split('&')[0];

        // 標準的なPC用URLを構築
        let convertedUrl = `https://www.youtube.com/watch?v=${videoId}`;
        
        // 特殊なクエリパラメータ（再生開始時間、プレイリスト）は有用なため復元
        const extraParams = [];
        if (listId) extraParams.push(`list=${listId}`);
        if (timeParam) extraParams.push(`t=${timeParam}`);
        
        if (extraParams.length > 0) {
          convertedUrl += `&${extraParams.join('&')}`;
        }

        return convertedUrl;
      } catch (e) {
        return '';
      }
    }

    // 変換アクションの実行
    function performConversion() {
      const converted = convertYoutubeUrl(inputUrl.value);
      if (converted) {
        outputUrl.value = converted;
        resultContainer.classList.remove('hidden');
      } else {
        resultContainer.classList.add('hidden');
        if (inputUrl.value.trim() !== '') {
          showToast('有効なYouTube URLを入力してください');
        }
      }
    }

    // ボタンクリック時のイベント
    convertBtn.addEventListener('click', performConversion);

    // Enterキー押下時のイベント
    inputUrl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        performConversion();
      }
    });

    // コピーボタンのアクション
    copyBtn.addEventListener('click', () => {
      if (outputUrl.value) {
        copyToClipboard(outputUrl.value);
      }
    });

    // 新しいタブで開くアクション
    openBtn.addEventListener('click', () => {
      if (outputUrl.value) {
        window.open(outputUrl.value, '_blank');
      }
    });
  </script>
</body>
</html>
